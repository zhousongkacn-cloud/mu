name: Update Coffee Live M3U

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Generate M3U
        run: |
          python generate_coffee_m3u.py

      - name: Commit and push coffee_live.m3u
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add coffee_live.m3u
          git commit -m "update coffee live m3u" || echo "No changes to commit"
          git push
